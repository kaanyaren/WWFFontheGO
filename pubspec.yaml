name: wwff_on_the_go
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  go_router: ^17.2.1
  path_provider: ^2.1.5
  share_plus: ^13.0.0
  animated_notch_bottom_bar: ^1.0.4
  google_fonts: ^8.0.2
  intl: ^0.20.2
  dio: ^5.9.2
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  animated_splash_screen: ^1.3.0
  page_transition: ^2.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  csv: ^8.0.0
  flutter_map_marker_cluster: ^1.4.0
  firedart: ^0.9.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_community_generator: ^3.3.2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
